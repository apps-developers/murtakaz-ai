[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["cd web && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["cd web && pnpm run build"]

[start]
cmd = "cd web && pnpm run start -- -H 0.0.0.0 -p ${PORT:-3000}"

